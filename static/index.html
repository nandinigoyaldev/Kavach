<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RakshAI — Your Silent Guardian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app" class="grid-container">
    <!-- LEFT COLUMN -->
    <section class="column left-col">
      <div class="card camera-card">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
        <div class="label">MediaPipe gesture detection active</div>
        <div class="hint">✋ Show 5 fingers to trigger silent SOS</div>
        <div class="voice-transcript" id="voiceTranscript"></div>
      </div>
    </section>

    <!-- CENTER COLUMN -->
    <section class="column center-col">
      <div class="card threat-card">
        <div class="threat-circle" id="threatCircle">0</div>
        <div class="threat-badge" id="threatBadge"><span class="level-text">LOW</span><span class="pulse-dot"></span></div>
        <ul class="observations" id="observationsList"></ul>
        <div class="recommendation" id="recommendationText"></div>
        <div class="last-scan" id="lastScan">Last scanned: – seconds ago</div>
      </div>
    </section>

    <!-- RIGHT COLUMN -->
    <section class="column right-col">
      <div class="card controls-card">
        <button id="sosBtn" class="btn btn-sos">🚨 SOS</button>
        <button id="fakeCallBtn" class="btn btn-fake">Fake Call</button>
        <button id="scanNowBtn" class="btn btn-scan">Scan Now</button>
        <hr class="divider" />
        <h3 class="section-header">Trusted Contacts</h3>
        <ul class="contact-list" id="contactList"></ul>
        <form id="addContactForm" class="add-contact-form">
          <input type="text" id="contactName" placeholder="Name" required />
          <input type="tel" id="contactPhone" placeholder="+91XXXXXXXXXX" pattern="\+\d{1,3}\d{7,14}" required />
          <button type="submit" class="btn btn-add">Add Contact</button>
        </form>
      </div>
    </section>
  </div>

  <!-- SOS Confirmation Modal -->
  <div id="sosModal" class="modal hidden">
    <div class="modal-content">
      <h2>SOS Triggered — Alerting your contacts</h2>
      <p>Sending alerts in <span id="countdown">5</span> seconds…</p>
      <button id="cancelSosBtn" class="btn btn-cancel">Cancel</button>
    </div>
  </div>

  <!-- Fake Call Overlay -->
  <div id="fakeCallOverlay" class="overlay hidden">
    <div class="call-ui">
      <div class="caller-avatar">👩‍👧‍👦</div>
      <div class="caller-name">Mom 💕</div>
      <div class="caller-subtitle">Incoming call...</div>
      <div class="call-actions">
        <button id="acceptCallBtn" class="btn btn-accept">✅</button>
        <button id="declineCallBtn" class="btn btn-decline">❌</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
